<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>MAPHRONIX - Secure Login</title>
<style>
  html, body { height: 100%; margin: 0; display: flex; align-items: center; justify-content: center;
    background: #0f172a; font-family: 'Segoe UI', Arial, sans-serif; }
  #box { background: #0f172a; border: 3px solid #4ade80; border-radius: 15px; padding: 32px; width: 340px; }
  h1 { color: #4ade80; font-size: 20px; text-align: center; margin: 0 0 24px; }
  label { color: #4ade80; font-size: 13px; font-weight: bold; display: block; margin-bottom: 6px; }
  input { width: 100%; background: #1e293b; border: 2px solid #334155; border-radius: 8px; color: #fff;
    padding: 10px; font-size: 14px; margin-bottom: 16px; box-sizing: border-box; }
  button { width: 100%; background: #4ade80; color: #0f172a; border: none; border-radius: 8px;
    font-size: 16px; font-weight: bold; padding: 12px; cursor: pointer; }
  button:hover { background: #22c55e; }
  #error { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 12px; min-height: 16px; }
</style>
</head>
<body>
  <div id="box">
    <h1>WELCOME TO MAPHRONIX</h1>
    <form method="POST">
      <label>User Name</label>
      <input type="text" name="username" placeholder="Enter Name..." required autofocus>
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter Password..." required>
      <div id="error">{{ error or '' }}</div>
      <button type="submit">LOGIN NOW</button>
    </form>
  </div>
</body>
</html>
