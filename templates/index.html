<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>MAPHRONIX Web</title>
<link rel="stylesheet" href="{{ frontend_config.leafletCssUrl }}"/>
<script src="{{ frontend_config.leafletJsUrl }}"></script>
<style>
  :root { --sidebar-width: 320px; --player-width: 42vw; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e5e7eb; }
  #layout {
    display: grid;
    grid-template-columns: var(--sidebar-width) 6px minmax(280px, var(--player-width)) 6px minmax(320px, 1fr);
    height: 100vh;
    overflow: hidden;
  }
  .resizer { width: 6px; background: #1e293b; cursor: col-resize; position: relative; }
  .resizer::after { content: ''; position: absolute; left: 2px; top: 0; bottom: 0; width: 2px; background: #334155; }
  .resizer:hover::after, .resizer.dragging::after { background: #4ade80; }
  body.resizing { cursor: col-resize; user-select: none; }

  /* ── Sidebar ── */
  #sidebar { padding: 16px; background: #0f172a; overflow-y: auto; min-width: 0; }
  #sidebar h1 { font-size: 18px; color: #4ade80; margin: 0 0 16px; }
  #drop-zone {
    border: 2px dashed #4ade80; border-radius: 8px; padding: 24px 12px;
    text-align: center; cursor: pointer; color: #9ca3af; font-size: 13px;
  }
  #drop-zone.dragover { background: #1e293b; }
  #file-input { display: none; }
  #upload-btn, #pause-upload-btn {
    width: 100%; margin-top: 10px; padding: 10px; background: #4ade80; color: #0f172a;
    border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
  }
  #pause-upload-btn { background: #1e293b; border: 2px solid #4ade80; color: #e5e7eb; }
  #upload-btn:disabled, #pause-upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { margin-top: 10px; font-size: 13px; color: #9ca3af; min-height: 18px; }
  #upload-progress-wrap {
    display: none; margin-top: 10px; width: 100%; height: 10px;
    background: #020617; border: 1px solid #334155; border-radius: 999px;
    overflow: hidden;
  }
  #upload-progress-bar {
    width: 0%; height: 100%; background: #4ade80; transition: width 120ms linear;
  }
  #upload-progress-text {
    display: none; margin-top: 6px; font-size: 12px; color: #9ca3af;
  }

  #video-list { list-style: none; padding: 0; margin-top: 14px; }
  #video-list li {
    padding: 8px 10px; border: 1px solid #334155; border-radius: 6px;
    margin-bottom: 6px; cursor: pointer; font-size: 13px; word-break: break-all;
  }
  #video-list li:hover { background: #1e293b; }
  #video-list li.nearby { background: #f59e0b; border-color: #f59e0b; color: #000; }
  #video-list li.active { background: #1d4ed8 !important; border-color: #1d4ed8 !important; color: #fff !important; }
  #video-list li.error { color: #ef4444; border-color: #ef4444; cursor: default; }

  /* ── Center: video player ── */
  #player-pane { min-width: 0; display: flex; flex-direction: column; background: #000; }
  #video-wrap { flex: 1; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
  #video-wrap video { max-width: 100%; max-height: 100%; transform-origin: center center; }
  #placeholder-text { color: #6b7280; font-size: 13px; }

  #telemetry { padding: 6px 10px; font-size: 12px; color: #9ca3af; background: #0f172a; border-top: 1px solid #1e293b; }

  #controls { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 10px; background: #0f172a; border-top: 1px solid #1e293b; }
  #controls button, #controls select {
    background: #1e293b; border: 2px solid #4ade80; border-radius: 6px; color: #e5e7eb;
    padding: 6px 10px; font-size: 12px; cursor: pointer; font-weight: bold;
  }
  #controls button:hover { background: #334155; }
  #controls button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Map ── */
  #map {
    min-width: 0; overflow: hidden; transition: transform 180ms ease, box-shadow 180ms ease;
    transform-origin: center bottom;
  }
  #map.map-3d {
    transform: perspective(1200px) rotateX(16deg) scale(1.04);
    box-shadow: 0 -18px 35px rgba(0, 0, 0, 0.35) inset;
  }
</style>
</head>
<body>

<div id="layout">
  <div id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
      <h1 style="margin:0;">MAPHRONIX Web</h1>
      <form method="POST" action="/logout">
        <button type="submit" style="background:#2d0a0a; border:1px solid #ef4444; color:#ef4444; border-radius:6px; padding:5px 10px; font-size:11px; cursor:pointer;">
          Logout
        </button>
      </form>
    </div>
    <div style="font-size:12px; color:#9ca3af; margin:-10px 0 14px;">Signed in as {{ username }}</div>

    <div id="drop-zone">
      Click or drag .mp4 / .mov files here
    </div>
    <input id="file-input" type="file" accept=".mp4,.mov" multiple>
    <button id="upload-btn" disabled>Upload &amp; Extract GPS</button>
    <button id="pause-upload-btn" disabled>Pause Upload</button>
    <div id="upload-progress-wrap" aria-hidden="true">
      <div id="upload-progress-bar"></div>
    </div>
    <div id="upload-progress-text"></div>
    <div id="status"></div>

    <div style="display:flex; gap:6px; margin-top:10px;">
      <button id="reset-map-btn" style="flex:1; padding:8px; background:#1e293b; border:2px solid #4ade80; border-radius:6px; color:#e5e7eb; font-weight:bold; cursor:pointer; font-size:12px;">
        &#128260; Reset Map
      </button>
      <button id="full-reset-btn" style="flex:1; padding:8px; background:#2d0a0a; border:2px solid #ef4444; border-radius:6px; color:#ef4444; font-weight:bold; cursor:pointer; font-size:12px;">
        &#128465; Full Reset
      </button>
    </div>
    <button id="toggle-3d-btn" style="width:100%; margin-top:6px; padding:8px; background:#1e293b; border:2px solid #4ade80; border-radius:6px; color:#e5e7eb; font-weight:bold; cursor:pointer; font-size:12px;">
      3D Map View
    </button>

    <ul id="video-list"></ul>

    <div style="margin-top: 16px;">
      <label style="font-size: 12px; color: #9ca3af;">Find by Coordinates:</label>
      <input id="coord-input" type="text" placeholder="20.512, 85.845  or  20°30'15&quot;N 85°50'44&quot;E"
             style="width: 100%; margin-top: 6px; padding: 8px; background: #020617; border: 1px solid #4ade80; color: #fff; border-radius: 4px; font-size: 12px;">
      <button id="search-coord-btn" style="width: 100%; margin-top: 6px; padding: 8px; background: #1e293b; border: 2px solid #4ade80; border-radius: 6px; color: #e5e7eb; font-weight: bold; cursor: pointer;">
        &#128205; Search Nearby Videos
      </button>
      <div id="search-status" style="font-size: 12px; color: #ef4444; margin-top: 6px;"></div>
    </div>
  </div>

  <div id="sidebar-resizer" class="resizer" title="Resize sidebar"></div>

  <div id="player-pane">
    <div id="video-wrap">
      <span id="placeholder-text">Select a video from the list to play it</span>
    </div>
    <div id="telemetry">Distance: 0 m | Time: 0 s</div>
    <div id="controls">
      <button id="play-pause-btn" disabled>&#9654; Play</button>
      <button id="back3-btn" disabled>&#9194; Back 3s</button>
      <button id="prev-frame-btn" disabled>&#8592; Prev Frame</button>
      <button id="next-frame-btn" disabled>&#8594; Next Frame</button>
      <button id="reset-zoom-btn" disabled>&#128269; Reset Zoom</button>
      <select id="speed-select" disabled>
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="5">5x</option>
        <option value="10">10x</option>
      </select>
      <button id="screenshot-btn" disabled>
        &#128247; Screenshot HD ({{ frontend_config.screenshotWidth }}&times;{{ frontend_config.screenshotHeight }})
      </button>
    </div>
  </div>

  <div id="map-resizer" class="resizer" title="Resize video and map"></div>

  <div id="map"></div>
</div>

<script>
var APP_CONFIG = {{ frontend_config | tojson }};
// ════════════════════════════════════════════
//  LEAFLET MAP  (ported from the desktop app's map_html())
// ════════════════════════════════════════════
var leafletMap = L.map('map', { zoomControl: true, attributionControl: false }).setView([0, 0], 2);

// Note: this uses Google's raw tile endpoint directly, same as the original
// desktop app. For a production deployment, prefer an official tile provider
// (Google Maps Platform with an API key + billing, Mapbox, or Esri) so you
// stay within that provider's terms of service.
L.tileLayer(APP_CONFIG.mapTileUrl, {
  subdomains: APP_CONFIG.mapTileSubdomains,
  maxZoom: APP_CONFIG.mapTileMaxZoom
}).addTo(leafletMap);

document.getElementById('toggle-3d-btn').addEventListener('click', function () {
  var mapEl = document.getElementById('map');
  var enabled = mapEl.classList.toggle('map-3d');
  this.textContent = enabled ? '2D Map View' : '3D Map View';
  setTimeout(function () { leafletMap.invalidateSize(); }, 150);
});

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function setupLayoutResizer(handleId, mode) {
  var handle = document.getElementById(handleId);
  var layout = document.getElementById('layout');
  handle.addEventListener('mousedown', function (event) {
    event.preventDefault();
    handle.classList.add('dragging');
    document.body.classList.add('resizing');

    function onMove(moveEvent) {
      var rect = layout.getBoundingClientRect();
      if (mode === 'sidebar') {
        var sidebarWidth = clamp(moveEvent.clientX - rect.left, 220, rect.width - 640);
        document.documentElement.style.setProperty('--sidebar-width', sidebarWidth + 'px');
      } else {
        var sidebarWidthNow = document.getElementById('sidebar').getBoundingClientRect().width;
        var playerWidth = clamp(moveEvent.clientX - rect.left - sidebarWidthNow - 12, 280, rect.width - sidebarWidthNow - 340);
        document.documentElement.style.setProperty('--player-width', playerWidth + 'px');
      }
      leafletMap.invalidateSize();
    }

    function onUp() {
      handle.classList.remove('dragging');
      document.body.classList.remove('resizing');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      leafletMap.invalidateSize();
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

setupLayoutResizer('sidebar-resizer', 'sidebar');
setupLayoutResizer('map-resizer', 'map');

function makeGooglePin(color) {
  color = color || '#EA4335';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">'
    + '<defs><radialGradient id="pg" cx="40%" cy="35%" r="60%">'
    + '<stop offset="0%" style="stop-color:#ff7b72"/>'
    + '<stop offset="100%" style="stop-color:' + color + '"/>'
    + '</radialGradient></defs>'
    + '<path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.268 21.732 0 14 0z"'
    + ' fill="url(#pg)" stroke="#c5271a" stroke-width="1"/>'
    + '<circle cx="14" cy="14" r="6" fill="white" opacity="0.95"/>'
    + '<circle cx="14" cy="14" r="2.5" fill="' + color + '"/>'
    + '</svg>';
  return L.divIcon({
    html: '<div style="filter:drop-shadow(0 4px 5px rgba(0,0,0,0.45))">' + svg + '</div>',
    iconSize: [28, 40], iconAnchor: [14, 40], className: ''
  });
}

// ── Blue search pin icon (distinct from the red video-position pin) ──
function makeSearchPin() {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="46" viewBox="0 0 32 46">'
    + '<defs><radialGradient id="spg" cx="40%" cy="35%" r="60%">'
    + '<stop offset="0%" style="stop-color:#93c5fd"/>'
    + '<stop offset="100%" style="stop-color:#2563eb"/>'
    + '</radialGradient></defs>'
    + '<path d="M16 0C7.163 0 0 7.163 0 16c0 12 16 30 16 30s16-18 16-30C32 7.163 24.837 0 16 0z"'
    + ' fill="url(#spg)" stroke="#1d4ed8" stroke-width="1.5"/>'
    + '<circle cx="16" cy="16" r="7" fill="white" opacity="0.95"/>'
    + '<circle cx="16" cy="16" r="3" fill="#2563eb"/>'
    + '</svg>';
  return L.divIcon({
    html: '<div style="filter:drop-shadow(0 5px 8px rgba(37,99,235,0.55))">' + svg + '</div>',
    iconSize: [32, 46], iconAnchor: [16, 46], className: ''
  });
}

var blueLayer   = L.featureGroup().addTo(leafletMap);
var activeLayer = L.featureGroup().addTo(leafletMap);
var pin         = L.marker([0, 0], { icon: makeGooglePin('#EA4335'), zIndexOffset: 1000 }).addTo(leafletMap);
var searchPin   = null;

function updatePin(lat, lon) { pin.setLatLng([lat, lon]); }

function setSearchPin(lat, lon) {
  if (searchPin) leafletMap.removeLayer(searchPin);
  searchPin = L.marker([lat, lon], { icon: makeSearchPin(), zIndexOffset: 2000 }).addTo(leafletMap);
  searchPin.bindPopup(
    '<b style="color:#2563eb">Searched Location</b><br>' + lat.toFixed(6) + ', ' + lon.toFixed(6)
  ).openPopup();
}

function clearSearchPin() {
  if (searchPin) { leafletMap.removeLayer(searchPin); searchPin = null; }
}

function clearMap() { blueLayer.clearLayers(); activeLayer.clearLayers(); clearSearchPin(); }

function addPath(pts) {
  if (!pts.length) return;
  L.polyline(pts.map(function(p){ return [p.lat, p.lon]; }),
    { color: '#15803d', weight: 2, opacity: 0.6 }).addTo(blueLayer);
  leafletMap.fitBounds(blueLayer.getBounds());
}

function setIsolateActive(pts) {
  activeLayer.clearLayers();
  if (!pts.length) return;
  L.polyline(pts.map(function(p){ return [p.lat, p.lon]; }),
    { color: '#4ade80', weight: 5 }).addTo(activeLayer);
  leafletMap.fitBounds(activeLayer.getBounds());
}

// ════════════════════════════════════════════
//  UPLOAD + GPS EXTRACTION
// ════════════════════════════════════════════
var dropZone   = document.getElementById('drop-zone');
var fileInput  = document.getElementById('file-input');
var uploadBtn  = document.getElementById('upload-btn');
var pauseUploadBtn = document.getElementById('pause-upload-btn');
var progressWrap = document.getElementById('upload-progress-wrap');
var progressBar  = document.getElementById('upload-progress-bar');
var progressText = document.getElementById('upload-progress-text');
var statusEl   = document.getElementById('status');
var videoList  = document.getElementById('video-list');

var videoGpsCache = {};   // video id -> [{lat, lon}, ...]
var selectedFiles = null;
var activeVideoId = null;
var uploadState = {
  running: false,
  paused: false,
  currentXhr: null,
  resumeWaiters: []
};

dropZone.addEventListener('click', function () { fileInput.click(); });

dropZone.addEventListener('dragover', function (e) {
  e.preventDefault(); dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function (e) {
  e.preventDefault(); dropZone.classList.remove('dragover');
  setFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', function () { setFiles(fileInput.files); });

function setFiles(fileListObj) {
  selectedFiles = fileListObj;
  uploadBtn.disabled = uploadState.running || !(fileListObj && fileListObj.length);
  pauseUploadBtn.disabled = true;
  resetUploadProgress();
  dropZone.textContent = fileListObj && fileListObj.length
    ? fileListObj.length + ' file(s) selected'
    : 'Click or drag .mp4 / .mov files here';
}

function formatBytes(bytes) {
  if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
  var units = ['B', 'KB', 'MB', 'GB', 'TB'];
  var size = bytes;
  var unitIndex = 0;
  while (size >= 1024 && unitIndex < units.length - 1) {
    size /= 1024;
    unitIndex++;
  }
  return size.toFixed(unitIndex === 0 ? 0 : 1) + ' ' + units[unitIndex];
}

function resetUploadProgress() {
  progressWrap.style.display = 'none';
  progressWrap.setAttribute('aria-hidden', 'true');
  progressBar.style.width = '0%';
  progressText.style.display = 'none';
  progressText.textContent = '';
}

function setUploadProgress(loaded, total) {
  progressWrap.style.display = 'block';
  progressWrap.setAttribute('aria-hidden', 'false');
  progressText.style.display = 'block';

  if (total) {
    var percent = Math.min(100, Math.max(0, Math.round((loaded / total) * 100)));
    progressBar.style.width = percent + '%';
    progressText.textContent = percent + '% uploaded (' + formatBytes(loaded) + ' of ' + formatBytes(total) + ')';
  } else {
    progressBar.style.width = '100%';
    progressText.textContent = formatBytes(loaded) + ' uploaded';
  }
}

function parseUploadResponse(xhr) {
  var text = xhr.responseText || '';
  var data = {};
  if (text) {
    try {
      data = JSON.parse(text);
    } catch (e) {
      data = { error: text.slice(0, 300) };
    }
  }
  if (xhr.status < 200 || xhr.status >= 300) {
    throw new Error(data.error || ('Server returned HTTP ' + xhr.status));
  }
  return data;
}

function requestJson(method, url, payload) {
  return new Promise(function (resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open(method, url);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function () {
      try {
        resolve(parseUploadResponse(xhr));
      } catch (err) {
        reject(err);
      }
    };
    xhr.onerror = function () { reject(new Error('Network error')); };
    xhr.send(JSON.stringify(payload || {}));
  });
}

function sendChunk(uploadId, file, offset, end) {
  return new Promise(function (resolve, reject) {
    var xhr = new XMLHttpRequest();
    uploadState.currentXhr = xhr;
    xhr.open('POST', '/upload/chunk');
    xhr.setRequestHeader('X-Upload-Id', uploadId);
    xhr.setRequestHeader('X-Chunk-Offset', String(offset));
    xhr.onload = function () {
      uploadState.currentXhr = null;
      try {
        resolve(parseUploadResponse(xhr));
      } catch (err) {
        reject(err);
      }
    };
    xhr.onerror = function () {
      uploadState.currentXhr = null;
      reject(new Error('Network error'));
    };
    xhr.onabort = function () {
      uploadState.currentXhr = null;
      resolve({ aborted: true, received: offset });
    };
    xhr.send(file.slice(offset, end));
  });
}

function waitForResume() {
  if (!uploadState.paused) return Promise.resolve();
  return new Promise(function (resolve) {
    uploadState.resumeWaiters.push(resolve);
  });
}

function resumeUploadLoop() {
  uploadState.paused = false;
  pauseUploadBtn.textContent = 'Pause Upload';
  statusEl.textContent = 'Uploading...';
  var waiters = uploadState.resumeWaiters.splice(0);
  waiters.forEach(function (resolve) { resolve(); });
}

pauseUploadBtn.addEventListener('click', function () {
  if (!uploadState.running) return;
  if (uploadState.paused) {
    resumeUploadLoop();
    return;
  }
  uploadState.paused = true;
  pauseUploadBtn.textContent = 'Resume Upload';
  statusEl.textContent = 'Upload paused. Click Resume Upload to continue.';
  if (uploadState.currentXhr) uploadState.currentXhr.abort();
});

uploadBtn.addEventListener('click', async function () {
  if (!selectedFiles || !selectedFiles.length) return;

  uploadState.running = true;
  uploadState.paused = false;
  uploadBtn.disabled = true;
  pauseUploadBtn.disabled = false;
  pauseUploadBtn.textContent = 'Pause Upload';

  var totalBytes = Array.prototype.reduce.call(selectedFiles, function (sum, file) {
    return sum + file.size;
  }, 0);
  var completedBeforeCurrentFile = 0;
  var chunkSize = APP_CONFIG.chunkSizeBytes;
  setUploadProgress(0, totalBytes);
  statusEl.textContent = 'Uploading...';

  try {
    for (var fileIndex = 0; fileIndex < selectedFiles.length; fileIndex++) {
      var file = selectedFiles[fileIndex];
      statusEl.textContent = 'Starting ' + file.name + '...';
      var start = await requestJson('POST', '/upload/start', {
        filename: file.name,
        total_size: file.size
      });
      var offset = start.received || 0;

      while (offset < file.size) {
        await waitForResume();
        var end = Math.min(offset + chunkSize, file.size);
        statusEl.textContent = 'Uploading ' + file.name + '...';
        var chunkResult = await sendChunk(start.upload_id, file, offset, end);
        if (chunkResult.aborted) {
          await waitForResume();
          continue;
        }
        offset = chunkResult.received;
        setUploadProgress(completedBeforeCurrentFile + offset, totalBytes);
      }

      statusEl.textContent = 'Extracting GPS from ' + file.name + '...';
      var finished = await requestJson('POST', '/upload/finish', { upload_id: start.upload_id });
      handleResult(finished.result);
      completedBeforeCurrentFile += file.size;
      setUploadProgress(completedBeforeCurrentFile, totalBytes);
    }
    progressBar.style.width = '100%';
    progressText.textContent = '100% uploaded. GPS extraction completed.';
    statusEl.textContent = '';
  } catch (err) {
    statusEl.textContent = 'Upload failed: ' + (err && err.message ? err.message : err)
      + '. For large videos, also check any reverse proxy limit and server timeout in front of Flask.';
  } finally {
    uploadState.running = false;
    uploadState.paused = false;
    uploadState.currentXhr = null;
    uploadState.resumeWaiters = [];
    uploadBtn.disabled = !(selectedFiles && selectedFiles.length);
    pauseUploadBtn.disabled = true;
    pauseUploadBtn.textContent = 'Pause Upload';
  }
});

function handleResult(result) {
  var li = document.createElement('li');
  li.textContent = result.filename;

  if (result.error) {
    li.textContent += '  —  ' + result.error;
    li.classList.add('error');
    videoList.appendChild(li);
    return;
  }

  videoGpsCache[result.id] = result.points;
  li.textContent += '  (' + result.point_count + ' GPS points)';

  li.addEventListener('click', function () {
    document.querySelectorAll('#video-list li').forEach(function (el) { el.classList.remove('active'); });
    li.classList.add('active');
    activeVideoId = result.id;
    setIsolateActive(videoGpsCache[result.id] || []);
    loadVideo(result.id);
  });

  videoList.appendChild(li);
  videoLiById[result.id] = li;

  if (result.points && result.points.length) {
    addPath(result.points);
  }
}

// ════════════════════════════════════════════
//  PHASE 2: VIDEO PLAYBACK SYNCED TO THE MAP
//  (ported from next_frame / toggle_playback / backward_3_seconds /
//   backward_one_frame / forward_one_frame / track_zoom / track_speed)
// ════════════════════════════════════════════
var videoWrap    = document.getElementById('video-wrap');
var telemetryEl  = document.getElementById('telemetry');
var playPauseBtn = document.getElementById('play-pause-btn');
var back3Btn     = document.getElementById('back3-btn');
var prevFrameBtn = document.getElementById('prev-frame-btn');
var nextFrameBtn = document.getElementById('next-frame-btn');
var resetZoomBtn = document.getElementById('reset-zoom-btn');
var speedSelect  = document.getElementById('speed-select');
var screenshotBtn = document.getElementById('screenshot-btn');

var currentVideoEl = null;
var currentPts = [];
var zoomFactor = 1.0;
var ASSUMED_FPS = 30; // used only for "1 frame" stepping; browsers don't expose real frame count

function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dphi = (lat2 - lat1) * Math.PI / 180;
  var dl   = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dphi/2) ** 2
        + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dl/2) ** 2;
  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function setControlsEnabled(enabled) {
  [playPauseBtn, back3Btn, prevFrameBtn, nextFrameBtn, resetZoomBtn, speedSelect, screenshotBtn]
    .forEach(function (el) { el.disabled = !enabled; });
}

function loadVideo(id) {
  currentPts = videoGpsCache[id] || [];
  zoomFactor = 1.0;

  videoWrap.innerHTML = '';
  var video = document.createElement('video');
  video.src = '/video/' + encodeURIComponent(id);
  video.controls = false;
  video.style.transform = 'scale(1)';
  videoWrap.appendChild(video);
  currentVideoEl = video;

  video.addEventListener('timeupdate', syncMapToVideo);
  video.addEventListener('play',  function () { playPauseBtn.innerHTML = '&#10074;&#10074; Pause'; });
  video.addEventListener('pause', function () { playPauseBtn.innerHTML = '&#9654; Play'; });
  video.addEventListener('wheel', onVideoWheelZoom, { passive: false });

  setControlsEnabled(true);
  video.play();
}

function syncMapToVideo() {
  if (!currentVideoEl || !currentPts.length || !currentVideoEl.duration) return;
  var ratio = currentVideoEl.currentTime / currentVideoEl.duration;
  var idx = Math.max(0, Math.min(currentPts.length - 1, Math.floor(ratio * (currentPts.length - 1))));
  var p = currentPts[idx];
  if (p) updatePin(p.lat, p.lon);

  var dist = 0;
  for (var i = 0; i < idx; i++) {
    dist += haversine(currentPts[i].lat, currentPts[i].lon, currentPts[i+1].lat, currentPts[i+1].lon);
  }
  telemetryEl.textContent = 'Distance: ' + dist.toFixed(1) + ' m | Time: ' + currentVideoEl.currentTime.toFixed(1) + ' s';
}

playPauseBtn.addEventListener('click', function () {
  if (!currentVideoEl) return;
  if (currentVideoEl.paused) currentVideoEl.play(); else currentVideoEl.pause();
});

back3Btn.addEventListener('click', function () {
  if (!currentVideoEl) return;
  currentVideoEl.currentTime = Math.max(0, currentVideoEl.currentTime - 3);
});

prevFrameBtn.addEventListener('click', function () {
  if (!currentVideoEl) return;
  var wasPlaying = !currentVideoEl.paused;
  currentVideoEl.pause();
  currentVideoEl.currentTime = Math.max(0, currentVideoEl.currentTime - (1 / ASSUMED_FPS));
  if (wasPlaying) currentVideoEl.play();
});

nextFrameBtn.addEventListener('click', function () {
  if (!currentVideoEl) return;
  var wasPlaying = !currentVideoEl.paused;
  currentVideoEl.pause();
  currentVideoEl.currentTime = Math.min(currentVideoEl.duration || 0, currentVideoEl.currentTime + (1 / ASSUMED_FPS));
  if (wasPlaying) currentVideoEl.play();
});

speedSelect.addEventListener('change', function () {
  if (!currentVideoEl) return;
  currentVideoEl.playbackRate = parseFloat(speedSelect.value);
});

resetZoomBtn.addEventListener('click', function () {
  zoomFactor = 1.0;
  if (currentVideoEl) currentVideoEl.style.transform = 'scale(1)';
});

function onVideoWheelZoom(e) {
  e.preventDefault();
  var step = e.deltaY < 0 ? 1.1 : 0.9;
  zoomFactor = Math.max(1.0, Math.min(zoomFactor * step, 10.0));
  currentVideoEl.style.transform = 'scale(' + zoomFactor + ')';
}

// ════════════════════════════════════════════
//  PHASE 3a: HD SCREENSHOT (ported from take_hd_screenshot)
// ════════════════════════════════════════════
// Note: the desktop app captured the GoPro's native decoded frame and scaled
// it to the configured screenshot size. The browser gives us the same decoded
// frame via video.videoWidth/videoHeight, so we draw that onto a canvas.
// The actual sharpness ceiling is still whatever resolution the video itself
// was recorded at -- scaling up doesn't add detail that wasn't there.
var TARGET_W = APP_CONFIG.screenshotWidth;
var TARGET_H = APP_CONFIG.screenshotHeight;

screenshotBtn.addEventListener('click', function () {
  if (!currentVideoEl || !currentVideoEl.videoWidth) {
    alert('No video frame loaded yet. Play a video first.');
    return;
  }
  var canvas = document.createElement('canvas');
  canvas.width = TARGET_W;
  canvas.height = TARGET_H;
  var ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(currentVideoEl, 0, 0, TARGET_W, TARGET_H);

  canvas.toBlob(function (blob) {
    var ts = new Date().toISOString().replace(/[:.]/g, '-');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'maphronix_' + ts + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }, 'image/png');
});

// ════════════════════════════════════════════
//  PHASE 3b: COORDINATE SEARCH (ported from parse_latlon / search_by_coords /
//  highlight_nearby)
// ════════════════════════════════════════════
var coordInput     = document.getElementById('coord-input');
var searchBtn      = document.getElementById('search-coord-btn');
var searchStatusEl = document.getElementById('search-status');
var videoLiById    = {}; // video id -> <li> element, filled in handleResult

function parseLatLon(text) {
  var raw = text.trim().replace(/(lat(itude)?|lon(gitude)?|lng)\s*[:=]?\s*/gi, ' ').trim();

  function dmsToDec(deg, min, sec, hemi) {
    var val = parseFloat(deg) + parseFloat(min) / 60 + parseFloat(sec) / 3600;
    if (/[SW]/i.test(hemi)) val = -val;
    return val;
  }

  // Full DMS: 20°30'15.6"N, 85°50'44.2"E
  var dmsFull = raw.match(
    /(\d{1,3})[°\s]+(\d{1,2})['′\s]+(\d{1,2}(?:\.\d+)?)["″\s]*([NSns]?)[\s,]*(\d{1,3})[°\s]+(\d{1,2})['′\s]+(\d{1,2}(?:\.\d+)?)["″\s]*([EWew]?)/
  );
  if (dmsFull) {
    var latH = dmsFull[4] || 'N', lonH = dmsFull[8] || 'E';
    return {
      lat: dmsToDec(dmsFull[1], dmsFull[2], dmsFull[3], latH),
      lon: dmsToDec(dmsFull[5], dmsFull[6], dmsFull[7], lonH)
    };
  }

  // Compact DMS: 203015N 855044E
  var dmsCompact = raw.match(/(\d{2})(\d{2})(\d{2}(?:\.\d+)?)([NSns])[\s,]*(\d{2,3})(\d{2})(\d{2}(?:\.\d+)?)([EWew])/);
  if (dmsCompact) {
    return {
      lat: dmsToDec(dmsCompact[1], dmsCompact[2], dmsCompact[3], dmsCompact[4]),
      lon: dmsToDec(dmsCompact[5], dmsCompact[6], dmsCompact[7], dmsCompact[8])
    };
  }

  // Decimal pair: 20.512345, 85.845678  (optional N/S/E/W suffixes)
  var decPair = raw.match(/([+-]?\d{1,3}(?:\.\d+)?)\s*°?\s*([NSns])?\s*[,;\s]\s*([+-]?\d{1,3}(?:\.\d+)?)\s*°?\s*([EWew])?/);
  if (decPair) {
    var lat = parseFloat(decPair[1]);
    var lon = parseFloat(decPair[3]);
    if (decPair[2] && decPair[2].toUpperCase() === 'S') lat = -Math.abs(lat);
    if (decPair[4] && decPair[4].toUpperCase() === 'W') lon = -Math.abs(lon);
    return { lat: lat, lon: lon };
  }

  // Last resort: first two numbers in the string
  var nums = raw.match(/[+-]?\d{1,3}(?:\.\d+)?/g);
  if (nums && nums.length >= 2) {
    return { lat: parseFloat(nums[0]), lon: parseFloat(nums[1]) };
  }

  throw new Error('Cannot parse coordinates');
}

function highlightNearby(lat, lon) {
  Object.keys(videoLiById).forEach(function (id) {
    var li = videoLiById[id];
    if (id === activeVideoId) return; // keep the active video's blue highlight, never override it
    var pts = videoGpsCache[id] || [];
    // Check every 10th point, same sampling the desktop app used for speed
    var isNear = pts.filter(function (_, i) { return i % 10 === 0; })
                     .some(function (p) { return haversine(lat, lon, p.lat, p.lon) < 15; });
    li.classList.toggle('nearby', isNear);
  });
}

// Ported from jump_to_location: seek the active video to whichever GPS point
// is closest to the clicked coordinate.
function jumpToLocation(lat, lon) {
  if (!currentVideoEl || !currentPts.length || !currentVideoEl.duration) return;
  var bestIdx = 0, bestDist = Infinity;
  for (var i = 0; i < currentPts.length; i++) {
    var d = haversine(lat, lon, currentPts[i].lat, currentPts[i].lon);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  var ratio = bestIdx / (currentPts.length - 1);
  currentVideoEl.currentTime = ratio * currentVideoEl.duration;
}

function runCoordinateSearch() {
  var text = coordInput.value;
  searchStatusEl.textContent = '';
  try {
    var ll = parseLatLon(text);
    if (ll.lat < -90 || ll.lat > 90 || ll.lon < -180 || ll.lon > 180) {
      throw new Error('Coordinates out of range');
    }
    highlightNearby(ll.lat, ll.lon);
    leafletMap.setView([ll.lat, ll.lon], 15);
    setSearchPin(ll.lat, ll.lon);
  } catch (e) {
    searchStatusEl.textContent = 'Could not parse coordinates. Try formats like '
      + '"20.512, 85.845" or "20°30\'15\\"N 85°50\'44\\"E".';
  }
}

searchBtn.addEventListener('click', runCoordinateSearch);
coordInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') runCoordinateSearch();
});

// Ported from handle_map_click: if a video is active, clicking the map seeks
// its playback to that location; otherwise it searches for nearby videos.
leafletMap.on('click', function (e) {
  if (activeVideoId) {
    jumpToLocation(e.latlng.lat, e.latlng.lng);
  } else {
    highlightNearby(e.latlng.lat, e.latlng.lng);
  }
});

// ════════════════════════════════════════════
//  RESET MAP / FULL RESET (ported from reset_map / full_reset)
// ════════════════════════════════════════════
document.getElementById('reset-map-btn').addEventListener('click', function () {
  activeVideoId = null;
  document.querySelectorAll('#video-list li').forEach(function (el) {
    el.classList.remove('active', 'nearby');
  });
  activeLayer.clearLayers();
  showAllPaths();
});

document.getElementById('full-reset-btn').addEventListener('click', function () {
  if (!confirm('This clears all uploaded videos and the map. Continue?')) return;
  activeVideoId = null;
  videoGpsCache = {};
  videoLiById = {};
  videoList.innerHTML = '';
  videoWrap.innerHTML = '<span id="placeholder-text">Select a video from the list to play it</span>';
  currentVideoEl = null;
  currentPts = [];
  telemetryEl.textContent = 'Distance: 0 m | Time: 0 s';
  setControlsEnabled(false);
  clearMap();
  coordInput.value = '';
  searchStatusEl.textContent = '';
});

function showAllPaths() { if (!leafletMap.hasLayer(blueLayer)) blueLayer.addTo(leafletMap); }
</script>
</body>
</html>
